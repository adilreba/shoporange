AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AtusHome E-Ticaret Backend - CORS Enabled

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Handler: index.handler
    Environment:
      Variables:
        NODE_ENV: production
        PRODUCTS_TABLE: !Ref ProductsTable
        USERS_TABLE: !Ref UsersTable
        ORDERS_TABLE: !Ref OrdersTable
        CART_TABLE: !Ref CartTable
        VERIFICATION_TABLE: !Ref VerificationTable
        FROM_EMAIL: !Ref FromEmail
        SMS_ORIGINATOR: 'AtusHome'
        COGNITO_USER_POOL_ID: !Ref UserPool
        COGNITO_CLIENT_ID: !Ref UserPoolClient

Parameters:
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: 'sk_test_placeholder'
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: 'whsec_test_placeholder'
  FromEmail:
    Type: String
    Default: 'noreply@atushome.com'

Resources:
  # DynamoDB Tables
  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Products
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  CartTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Cart
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: productId
          KeyType: RANGE

  VerificationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Verification
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: type
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiryTime
        Enabled: true

  # Cognito
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: AtusHome-UserPool
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AtusHome-WebClient
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH

  SESIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref FromEmail

  # API Gateway - CORS ENABLED
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"

  # Lambda Functions
  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products
            Method: get
            RestApiId: !Ref ApiGateway

  GetProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products/{id}
            Method: get
            RestApiId: !Ref ApiGateway

  SearchProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products/search
            Method: get
            RestApiId: !Ref ApiGateway

  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: get
            RestApiId: !Ref ApiGateway

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: put
            RestApiId: !Ref ApiGateway

  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders
            Method: get
            RestApiId: !Ref ApiGateway

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders/{id}
            Method: get
            RestApiId: !Ref ApiGateway

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders
            Method: post
            RestApiId: !Ref ApiGateway

  GetCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: get
            RestApiId: !Ref ApiGateway

  AddToCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: post
            RestApiId: !Ref ApiGateway

  UpdateCartItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart/{productId}
            Method: put
            RestApiId: !Ref ApiGateway

  RemoveFromCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart/{productId}
            Method: delete
            RestApiId: !Ref ApiGateway

  ClearCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: delete
            RestApiId: !Ref ApiGateway

  CreatePaymentIntentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/intent
            Method: post
            RestApiId: !Ref ApiGateway

  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/webhook
            Method: post
            RestApiId: !Ref ApiGateway

  SeedDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/seed
            Method: post
            RestApiId: !Ref ApiGateway

  SendEmailVerificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/email/send
            Method: post
            RestApiId: !Ref ApiGateway

  VerifyEmailOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/email/verify
            Method: post
            RestApiId: !Ref ApiGateway

  SendPhoneVerificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/phone/send
            Method: post
            RestApiId: !Ref ApiGateway

  VerifyPhoneOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/phone/verify
            Method: post
            RestApiId: !Ref ApiGateway

  ValidateAddressFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/address
            Method: post
            RestApiId: !Ref ApiGateway

Outputs:
  ApiUrl:
    Description: API Gateway Endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  CognitoDomain:
    Description: Cognito Domain
    Value: !Sub '${UserPool}.auth.${AWS::Region}.amazoncognito.com'

  # IAM Roles
  DynamoDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:BatchWriteItem
            Resource:
              - !GetAtt ProductsTable.Arn
              - !GetAtt UsersTable.Arn
              - !GetAtt OrdersTable.Arn
              - !GetAtt CartTable.Arn
              - !GetAtt VerificationTable.Arn
          - Effect: Allow
            Action:
              - ses:SendEmail
              - sns:Publish
            Resource: '*'
