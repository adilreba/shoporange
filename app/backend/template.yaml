AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AtusHome E-Ticaret Backend - CORS Enabled

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Handler: index.handler
    Layers:
      - !Ref DependenciesLayer
    Environment:
      Variables:
        NODE_ENV: production
        PRODUCTS_TABLE: !Ref ProductsTable
        USERS_TABLE: !Ref UsersTable
        ORDERS_TABLE: !Ref OrdersTable
        CART_TABLE: !Ref CartTable
        VERIFICATION_TABLE: !Ref VerificationTable
        STOCK_RESERVATIONS_TABLE: !Ref StockReservationsTable
        SHIPPING_TABLE: !Ref ShippingTable
        CHAT_CONNECTIONS_TABLE: !Ref ChatConnectionsTable
        CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
        CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
        CATEGORY_ATTRIBUTES_TABLE: !Ref CategoryAttributesTable
        PRODUCT_VARIATIONS_TABLE: !Ref ProductVariationsTable
        CATEGORIES_TABLE: !Ref CategoriesTable
        AUDIT_LOGS_TABLE: !Ref AuditLogsTable
        KMS_KEY_ID: !Ref PIIEncryptionKey
        FROM_EMAIL: !Ref FromEmail
        SMS_ORIGINATOR: 'AtusHome'
        COGNITO_USER_POOL_ID: !Ref UserPool
        COGNITO_CLIENT_ID: !Ref UserPoolClient
        SUPER_ADMIN_EMAIL: !Ref SuperAdminEmail

Parameters:
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: 'sk_test_placeholder'
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: 'whsec_test_placeholder'
  FromEmail:
    Type: String
    Default: 'adminatush@gmail.com'
  SuperAdminEmail:
    Type: String
    Default: ''
    Description: 'Google email for automatic super_admin access (optional)'

Resources:
  # DynamoDB Tables
  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Products
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Category Attributes Schema Table (Amazon-style dynamic attributes)
  CategoryAttributesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-CategoryAttributes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: categoryId
          AttributeType: S
        - AttributeName: attributeId
          AttributeType: S
      KeySchema:
        - AttributeName: categoryId
          KeyType: HASH
        - AttributeName: attributeId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: AttributeIndex
          KeySchema:
            - AttributeName: attributeId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Product Variations Table (SKU level inventory/pricing)
  ProductVariationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-ProductVariations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
        - AttributeName: variationId
          AttributeType: S
        - AttributeName: sku
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
        - AttributeName: variationId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SkuIndex
          KeySchema:
            - AttributeName: sku
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Categories Table (for dynamic category management)
  CategoriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Categories
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: categoryId
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: categoryId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SlugIndex
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  CartTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Cart
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: productId
          KeyType: RANGE

  VerificationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Verification
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: type
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiryTime
        Enabled: true

  # Stock Reservations Table
  StockReservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-StockReservations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: reservationId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: reservationId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ProductIdIndex
          KeySchema:
            - AttributeName: productId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Invoices Table (e-Fatura / e-Arşiv)
  InvoicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Invoices
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: invoiceId
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: invoiceNumber
          AttributeType: S
      KeySchema:
        - AttributeName: invoiceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OrderIdIndex
          KeySchema:
            - AttributeName: orderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: InvoiceNumberIndex
          KeySchema:
            - AttributeName: invoiceNumber
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Shipping Table (Kargo Takibi)
  ShippingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Shipping
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: shippingId
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: trackingNumber
          AttributeType: S
        - AttributeName: provider
          AttributeType: S
      KeySchema:
        - AttributeName: shippingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OrderIdIndex
          KeySchema:
            - AttributeName: orderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: TrackingNumberIndex
          KeySchema:
            - AttributeName: trackingNumber
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ProviderIndex
          KeySchema:
            - AttributeName: provider
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Chat Tables (Live Support)
  ChatConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-ChatConnections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ChatSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-ChatSessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: agentId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CustomerIdIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: AgentIdIndex
          KeySchema:
            - AttributeName: agentId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ChatMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-ChatMessages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: messageId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: messageId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ============================================
  # Security: Audit Logs & Encryption
  # ============================================

  # KMS Key for PII Encryption
  PIIEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for PII data encryption (GDPR/PCI-DSS compliance)
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow Lambda Functions
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'
          - Sid: Allow DynamoDB
            Effect: Allow
            Principal:
              Service: dynamodb.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: '*'

  PIIEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/atushome-pii-encryption
      TargetKeyId: !Ref PIIEncryptionKey

  # Audit Logs Table for compliance
  AuditLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-AuditLogs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: logId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: eventType
          AttributeType: S
      KeySchema:
        - AttributeName: logId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: EventTypeIndex
          KeySchema:
            - AttributeName: eventType
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref PIIEncryptionKey
        SSEType: KMS

  # Cognito
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: AtusHome-UserPool
      AutoVerifiedAttributes:
        - email
      EmailConfiguration:
        EmailSendingAccount: DEVELOPER
        SourceArn: !Sub 'arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${FromEmail}'
        From: !Ref FromEmail
        ReplyToEmailAddress: !Ref FromEmail
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true
          Required: false
          StringAttributeConstraints:
            MinLength: 1
            MaxLength: 20

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AtusHome-WebClient
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH

  # Legal Pages Table (Yasal Sayfalar)
  LegalPagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-LegalPages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SlugIndex
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # API Gateway - CORS ENABLED
  # NOTE: Cognito Auth is applied per-function, not globally
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn
            Identity:
              Header: Authorization
              ValidationExpression: ^Bearer [-0-9a-zA-Z\._]*$
              ReauthorizeEvery: 300
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"
  # Lambda Functions
  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: NONE

  GetProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products/{productId}
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: NONE

  SearchProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products/search
            Method: get
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: NONE

  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !GetAtt PIIEncryptionKey.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/{userId}
            Method: get
            RestApiId: !Ref ApiGateway

  GetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !GetAtt PIIEncryptionKey.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/me
            Method: get
            RestApiId: !Ref ApiGateway

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt PIIEncryptionKey.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/{userId}
            Method: put
            RestApiId: !Ref ApiGateway

  UpdateMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt PIIEncryptionKey.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/me
            Method: put
            RestApiId: !Ref ApiGateway

  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt PIIEncryptionKey.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders
            Method: get
            RestApiId: !Ref ApiGateway

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt PIIEncryptionKey.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders/{orderId}
            Method: get
            RestApiId: !Ref ApiGateway

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogsTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
              Resource: !GetAtt PIIEncryptionKey.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders
            Method: post
            RestApiId: !Ref ApiGateway

  GetCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: get
            RestApiId: !Ref ApiGateway

  AddToCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CartTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: post
            RestApiId: !Ref ApiGateway

  UpdateCartItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart/{productId}
            Method: put
            RestApiId: !Ref ApiGateway

  RemoveFromCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart/{productId}
            Method: delete
            RestApiId: !Ref ApiGateway

  ClearCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CartTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: delete
            RestApiId: !Ref ApiGateway

  CreatePaymentIntentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/create-intent
            Method: post
            RestApiId: !Ref ApiGateway

  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/webhook
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: NONE

  PostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: postConfirmation.handler
      Description: Cognito Post Confirmation trigger to add user to default group and create DynamoDB profile
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref UserPool
          USERS_TABLE: !Ref UsersTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !GetAtt UserPool.Arn
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  PostConfirmationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PostConfirmationFunction
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  SeedDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.seedData
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/seed
            Method: post
            RestApiId: !Ref ApiGateway
            Auth:
              Authorizer: NONE

  GetImageUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/images
      Handler: index.getUploadUrl
      Description: Generate S3 presigned URL for image uploads
      Environment:
        Variables:
          IMAGE_BUCKET: !Ref ProductImagesBucket
          CDN_URL: !Sub 'https://${ImageDistribution.DomainName}'
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
              Resource: !Sub '${ProductImagesBucket.Arn}/*'
      Events:
