            Path: /auth/forgot-password
            Method: post
            RestApiId: !Ref ApiGateway

  AuthResetPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.resetPassword
      Description: Reset password with code
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ConfirmForgotPassword
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/reset-password
            Method: post
            RestApiId: !Ref ApiGateway

  AuthGoogleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.googleLogin
      Description: Google OAuth login
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
                - cognito-idp:GetUser
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/google
            Method: post
            RestApiId: !Ref ApiGateway

