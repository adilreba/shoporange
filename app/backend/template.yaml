AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AtusHome E-Ticaret Backend - CORS Enabled

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Handler: index.handler
    Environment:
      Variables:
        NODE_ENV: production
        PRODUCTS_TABLE: !Ref ProductsTable
        USERS_TABLE: !Ref UsersTable
        ORDERS_TABLE: !Ref OrdersTable
        CART_TABLE: !Ref CartTable
        VERIFICATION_TABLE: !Ref VerificationTable
        STOCK_RESERVATIONS_TABLE: !Ref StockReservationsTable
        SHIPPING_TABLE: !Ref ShippingTable
        CHAT_CONNECTIONS_TABLE: !Ref ChatConnectionsTable
        CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
        CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
        FROM_EMAIL: !Ref FromEmail
        SMS_ORIGINATOR: 'AtusHome'
        COGNITO_USER_POOL_ID: !Ref UserPool
        COGNITO_CLIENT_ID: !Ref UserPoolClient

Parameters:
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: 'sk_test_placeholder'
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: 'whsec_test_placeholder'
  FromEmail:
    Type: String
    Default: 'noreply@atushome.com'

Resources:
  # DynamoDB Tables
  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Products
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  CartTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Cart
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: productId
          KeyType: RANGE

  VerificationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Verification
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: type
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiryTime
        Enabled: true

  # Stock Reservations Table
  StockReservationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-StockReservations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: reservationId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: reservationId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ProductIdIndex
          KeySchema:
            - AttributeName: productId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Invoices Table (e-Fatura / e-Arşiv)
  InvoicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Invoices
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: invoiceId
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: invoiceNumber
          AttributeType: S
      KeySchema:
        - AttributeName: invoiceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OrderIdIndex
          KeySchema:
            - AttributeName: orderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: InvoiceNumberIndex
          KeySchema:
            - AttributeName: invoiceNumber
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Shipping Table (Kargo Takibi)
  ShippingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-Shipping
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: shippingId
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: trackingNumber
          AttributeType: S
        - AttributeName: provider
          AttributeType: S
      KeySchema:
        - AttributeName: shippingId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OrderIdIndex
          KeySchema:
            - AttributeName: orderId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: TrackingNumberIndex
          KeySchema:
            - AttributeName: trackingNumber
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ProviderIndex
          KeySchema:
            - AttributeName: provider
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # Chat Tables (Live Support)
  ChatConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-ChatConnections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ChatSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-ChatSessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: customerId
          AttributeType: S
        - AttributeName: agentId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CustomerIdIndex
          KeySchema:
            - AttributeName: customerId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: AgentIdIndex
          KeySchema:
            - AttributeName: agentId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ChatMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-ChatMessages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: messageId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: messageId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SessionIdIndex
          KeySchema:
            - AttributeName: sessionId
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Cognito
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: AtusHome-UserPool
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: AtusHome-WebClient
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH

  SESIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref FromEmail

  # Legal Pages Table (Yasal Sayfalar)
  LegalPagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: AtusHome-LegalPages
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SlugIndex
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # API Gateway - CORS ENABLED
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        MaxAge: "'600'"

  # Lambda Functions
  GetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products
            Method: get
            RestApiId: !Ref ApiGateway

  GetProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products/{id}
            Method: get
            RestApiId: !Ref ApiGateway

  SearchProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/products
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /products/search
            Method: get
            RestApiId: !Ref ApiGateway

  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: get
            RestApiId: !Ref ApiGateway

  GetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/me
            Method: get
            RestApiId: !Ref ApiGateway

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: put
            RestApiId: !Ref ApiGateway

  UpdateMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/users
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /users/me
            Method: put
            RestApiId: !Ref ApiGateway

  GetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders
            Method: get
            RestApiId: !Ref ApiGateway

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders/{id}
            Method: get
            RestApiId: !Ref ApiGateway

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/orders
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /orders
            Method: post
            RestApiId: !Ref ApiGateway

  GetCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: get
            RestApiId: !Ref ApiGateway

  AddToCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: post
            RestApiId: !Ref ApiGateway

  UpdateCartItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart/{productId}
            Method: put
            RestApiId: !Ref ApiGateway

  RemoveFromCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart/{productId}
            Method: delete
            RestApiId: !Ref ApiGateway

  ClearCartFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/cart
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /cart
            Method: delete
            RestApiId: !Ref ApiGateway

  CreatePaymentIntentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/create-intent
            Method: post
            RestApiId: !Ref ApiGateway

  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/webhook
            Method: post
            RestApiId: !Ref ApiGateway

  SeedDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/seed
            Method: post
            RestApiId: !Ref ApiGateway

  SendEmailVerificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/email/send
            Method: post
            RestApiId: !Ref ApiGateway

  VerifyEmailOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/email/confirm
            Method: post
            RestApiId: !Ref ApiGateway

  SendPhoneVerificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/phone/send
            Method: post
            RestApiId: !Ref ApiGateway

  VerifyPhoneOTPFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/phone/confirm
            Method: post
            RestApiId: !Ref ApiGateway

  ValidateAddressFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/verification
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /verify/address
            Method: post
            RestApiId: !Ref ApiGateway

  # Admin - Get All Products
  AdminGetProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/products
            Method: get
            RestApiId: !Ref ApiGateway

  # Admin - Create Product
  AdminCreateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/products
            Method: post
            RestApiId: !Ref ApiGateway

  # Admin - Update Product
  AdminUpdateProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/products/{id}
            Method: put
            RestApiId: !Ref ApiGateway

  # Admin - Delete Product
  AdminDeleteProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/products/{id}
            Method: delete
            RestApiId: !Ref ApiGateway

  # Admin - Get All Orders
  AdminGetOrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/orders
            Method: get
            RestApiId: !Ref ApiGateway

  # Admin - Update Order Status
  AdminUpdateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/orders/{id}
            Method: put
            RestApiId: !Ref ApiGateway

  # Admin - Get All Users
  AdminGetUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/admin
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /admin/users
            Method: get
            RestApiId: !Ref ApiGateway

  # ============================================
  # Stock Management Functions
  # ============================================
  
  CheckStockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/check/{id}
            Method: post
            RestApiId: !Ref ApiGateway

  ReserveStockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/reserve
            Method: post
            RestApiId: !Ref ApiGateway

  ReleaseStockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/release/{id}
            Method: post
            RestApiId: !Ref ApiGateway

  ConfirmStockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/confirm/{id}
            Method: post
            RestApiId: !Ref ApiGateway

  UpdateStockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/update/{id}
            Method: put
            RestApiId: !Ref ApiGateway

  BulkUpdateStockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/bulk-update
            Method: put
            RestApiId: !Ref ApiGateway

  GetUserReservationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/reservations/{userId}
            Method: get
            RestApiId: !Ref ApiGateway

  GetLowStockFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stock
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /stock/low-stock
            Method: get
            RestApiId: !Ref ApiGateway

  # e-Fatura / e-Arşiv Functions
  CreateInvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/invoicing
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InvoicesTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /invoices
            Method: post
            RestApiId: !Ref ApiGateway

  CreateArchiveInvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/invoicing
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InvoicesTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /invoices/archive
            Method: post
            RestApiId: !Ref ApiGateway

  ValidateInvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/invoicing
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /invoices/validate
            Method: post
            RestApiId: !Ref ApiGateway

  GetInvoiceStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/invoicing
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref InvoicesTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /invoices/{invoiceId}/status
            Method: get
            RestApiId: !Ref ApiGateway

  CancelInvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/invoicing
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InvoicesTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /invoices/{invoiceId}/cancel
            Method: post
            RestApiId: !Ref ApiGateway

  # Shipping (Kargo) Functions
  CreateShipmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/shipping
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShippingTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /shipping
            Method: post
            RestApiId: !Ref ApiGateway

  GetShipmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/shipping
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShippingTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /shipping/order/{orderId}
            Method: get
            RestApiId: !Ref ApiGateway

  TrackShipmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/shipping
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ShippingTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /shipping/track/{trackingNumber}
            Method: get
            RestApiId: !Ref ApiGateway

  CancelShipmentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/shipping
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShippingTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /shipping/{shippingId}/cancel
            Method: post
            RestApiId: !Ref ApiGateway

  ShippingWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/shipping
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShippingTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /shipping/webhook
            Method: post
            RestApiId: !Ref ApiGateway

  GetShippingRatesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/shipping
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /shipping/rates
            Method: post
            RestApiId: !Ref ApiGateway

  GetShippingProvidersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/shipping
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /shipping/providers
            Method: get
            RestApiId: !Ref ApiGateway

  # Notification Functions
  SendNotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/notifications
      Handler: index.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: '*'
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /notifications/send
            Method: post
            RestApiId: !Ref ApiGateway

  TestNotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/notifications
      Handler: index.handler
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /notifications/test
            Method: get
            RestApiId: !Ref ApiGateway

  # DynamoDB Stream Handler for Order Notifications
  OrderNotificationStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/notifications
      Handler: index.handler
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: '*'
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
      Events:
        StreamEvent:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt OrdersTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 10
            Enabled: true

  # ============================================
  # WebSocket Chat API
  # ============================================
  
  # WebSocket API Gateway
  ChatWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: AtusHome-ChatWebSocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  # WebSocket Deployment
  ChatWebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ChatConnectRoute
      - ChatDisconnectRoute
      - ChatMessageRoute
    Properties:
      ApiId: !Ref ChatWebSocketApi

  # WebSocket Stage
  ChatWebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ChatWebSocketApi
      StageName: prod
      DeploymentId: !Ref ChatWebSocketDeployment

  # WebSocket Routes
  ChatConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: $connect
      Target: !Sub integrations/${ChatConnectIntegration}

  ChatConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ChatWebSocketFunction.Arn}/invocations

  ChatDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${ChatDisconnectIntegration}

  ChatDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ChatWebSocketFunction.Arn}/invocations

  ChatMessageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatWebSocketApi
      RouteKey: sendmessage
      Target: !Sub integrations/${ChatMessageIntegration}

  ChatMessageIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ChatWebSocketFunction.Arn}/invocations

  # WebSocket Lambda Function
  ChatWebSocketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/chat
      Handler: index.handler
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          CHAT_CONNECTIONS_TABLE: !Ref ChatConnectionsTable
          CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          WEBSOCKET_API_ENDPOINT: !Sub wss://${ChatWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatMessagesTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*

  # HTTP API for Chat Management
  GetWaitingChatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/chat
      Handler: index.handler
      Environment:
        Variables:
          CHAT_CONNECTIONS_TABLE: !Ref ChatConnectionsTable
          CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChatSessionsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /chat/waiting
            Method: get
            RestApiId: !Ref ApiGateway

  GetAgentChatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/chat
      Handler: index.handler
      Environment:
        Variables:
          CHAT_CONNECTIONS_TABLE: !Ref ChatConnectionsTable
          CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChatSessionsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /chat/agent/{agentId}
            Method: get
            RestApiId: !Ref ApiGateway

  AssignAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/chat
      Handler: index.handler
      Environment:
        Variables:
          CHAT_CONNECTIONS_TABLE: !Ref ChatConnectionsTable
          CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          WEBSOCKET_API_ENDPOINT: !Sub wss://${ChatWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatSessionsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /chat/assign
            Method: post
            RestApiId: !Ref ApiGateway

  GetChatMessagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/chat
      Handler: index.handler
      Environment:
        Variables:
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ChatMessagesTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /chat/{sessionId}/messages
            Method: get
            RestApiId: !Ref ApiGateway

  CloseChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/chat
      Handler: index.handler
      Environment:
        Variables:
          CHAT_CONNECTIONS_TABLE: !Ref ChatConnectionsTable
          CHAT_SESSIONS_TABLE: !Ref ChatSessionsTable
          CHAT_MESSAGES_TABLE: !Ref ChatMessagesTable
          WEBSOCKET_API_ENDPOINT: !Sub wss://${ChatWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatSessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChatConnectionsTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatWebSocketApi}/*
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /chat/{sessionId}/close
            Method: post
            RestApiId: !Ref ApiGateway

# ============================================
# Auth Functions
# ============================================

  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.register
      Description: Register new user with Cognito
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:SignUp
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/register
            Method: post
            RestApiId: !Ref ApiGateway

  AuthVerifyEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.verifyEmail
      Description: Verify email with confirmation code
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ConfirmSignUp
                - cognito-idp:ResendConfirmationCode
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/verify
            Method: post
            RestApiId: !Ref ApiGateway

  AuthResendCodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.resendCode
      Description: Resend verification code
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ResendConfirmationCode
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/resend-code
            Method: post
            RestApiId: !Ref ApiGateway

  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.login
      Description: Login user with Cognito
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
                - cognito-idp:GetUser
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/login
            Method: post
            RestApiId: !Ref ApiGateway

  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.refreshToken
      Description: Refresh access token
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/refresh
            Method: post
            RestApiId: !Ref ApiGateway

  AuthLogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.logout
      Description: Logout user
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:GlobalSignOut
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/logout
            Method: post
            RestApiId: !Ref ApiGateway

  AuthMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.getMe
      Description: Get current user
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:GetUser
              Resource: !GetAtt UserPool.Arn
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /auth/me
            Method: get
            RestApiId: !Ref ApiGateway

  AuthForgotPasswordFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth
      Handler: index.forgotPassword
      Description: Send password reset code
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ForgotPassword
