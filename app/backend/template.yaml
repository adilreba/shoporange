      Environment:
        Variables:
          IYZICO_SECRET_NAME: !Sub 'atushome/${AWS::StackName}/iyzico'
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:atushome/${AWS::StackName}/iyzico-*'
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/iyzico/installments
            Method: get
            RestApiId: !Ref ApiGateway

  IyzicoRefundFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.iyzicoRefund
      Description: Refund İyzico payment
      Environment:
        Variables:
          IYZICO_SECRET_NAME: !Sub 'atushome/${AWS::StackName}/iyzico'
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:atushome/${AWS::StackName}/iyzico-*'
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/iyzico/refund
            Method: post
            RestApiId: !Ref ApiGateway

  IyzicoCancelFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payments
      Handler: index.iyzicoCancel
      Description: Cancel İyzico payment
      Environment:
        Variables:
          IYZICO_SECRET_NAME: !Sub 'atushome/${AWS::StackName}/iyzico'
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:atushome/${AWS::StackName}/iyzico-*'
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /payments/iyzico/cancel
            Method: post
            RestApiId: !Ref ApiGateway

  # Cognito User Pool Domain for OAuth
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub 'atushome-${AWS::StackName}'
      UserPoolId: !Ref UserPool

  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${AWS::StackName}-dependencies'
      Description: Common Node.js dependencies for AtusHome backend
      ContentUri: layer/nodejs/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: nodejs20.x

  # ============================================
  # S3 & CloudFront for Product Images
  # ============================================

  ProductImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'atushome-product-images-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - HEAD
            AllowedOrigins:
              - '*'
            MaxAge: 3600

  ProductImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ProductImagesBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontGetObject
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${ProductImagesBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${ImageDistribution}'

  ImageDistributionOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ImageDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3ProductImages
            DomainName: !GetAtt ProductImagesBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref ImageDistributionOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3ProductImages
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
          MinTTL: 86400
          DefaultTTL: 604800
          MaxTTL: 31536000
          Compress: true
        PriceClass: PriceClass_100
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub '${AWS::StackName} Product Images CDN'

# ============================================
# Outputs
# ============================================

Outputs:
  ApiUrl:
    Description: API Gateway Endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'
  
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  
  CognitoDomain:
    Description: Cognito Domain
    Value: !Sub '${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com'
  
  SeedDataFunction:
    Description: Seed Data Lambda Function Name
    Value: !Ref SeedDataFunction
  
  ChatWebSocketEndpoint:
    Description: WebSocket API Endpoint for Live Chat
    Value: !Sub wss://${ChatWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod
  
  KMSKeyId:
    Description: KMS Key ID for PII Encryption
    Value: !Ref PIIEncryptionKey
  
  AuditLogsTableName:
    Description: Audit Logs Table Name
    Value: !Ref AuditLogsTable

  CdnUrl:
    Description: CloudFront Distribution URL for product images
    Value: !Sub 'https://${ImageDistribution.DomainName}'

  ImageBucketName:
    Description: S3 Bucket Name for product images
    Value: !Ref ProductImagesBucket
