# IAM Policy for Lambda Functions
Policies:
  - DynamoDBCrudPolicy:
      TableName: !Ref ProductsTable
  - DynamoDBCrudPolicy:
      TableName: !Ref UsersTable
  - DynamoDBCrudPolicy:
      TableName: !Ref OrdersTable
  - DynamoDBCrudPolicy:
      TableName: !Ref CartTable
  - DynamoDBCrudPolicy:
      TableName: !Ref VerificationTable
  - Statement:
      - Effect: Allow
        Action:
          - ses:SendEmail
          - ses:SendTemplatedEmail
        Resource: '*'
      - Effect: Allow
        Action:
          - sns:Publish
        Resource: '*'
